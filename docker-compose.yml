services:
  postgres:
    image: postgres:16-alpine
    container_name: gmcauditor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gmc
      POSTGRES_PASSWORD: gmc
      POSTGRES_DB: gmcauditor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gmc -d gmcauditor"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gmcauditor-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres-data:
