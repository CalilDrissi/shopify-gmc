{{ define "content" }}
<article class="c-card c-card--elevated">
  <div class="c-card__header">
    <h1 class="c-card__title">{{ if .OK }}Email confirmed{{ else }}Verification failed{{ end }}</h1>
  </div>
  <div class="c-card__body">
    {{ if .OK }}
      <p>Welcome to shopifygmc. Your email is confirmed.</p>
      <p style="margin-top:16px;">
        <a href="/login" class="c-button c-button--filled"><span class="c-button__label">Sign in</span></a>
      </p>
    {{ else }}
      <p>{{ .Error }}</p>
      <p style="margin-top:16px;">
        <a href="/login">Sign in</a> or <a href="/signup">try signing up again</a>.
      </p>
    {{ end }}
  </div>
</article>
{{ end }}
