{{ define "content" }}
<article class="c-card c-card--elevated">
  <div class="c-card__header">
    <h1 class="c-card__title">Forgot your password?</h1>
    <p class="c-card__subtitle">Enter your email — we'll send a reset link if an account exists.</p>
  </div>
  <form class="c-card__body" method="post" action="/forgot-password" style="display:flex; flex-direction:column; gap:16px;">
    {{ template "form-field" .Fields.Email }}
    <button type="submit" class="c-button c-button--filled c-button--full-width">
      <span class="c-button__label">Send reset link</span>
    </button>
    <p style="text-align:center;"><a href="/login">Back to sign in</a></p>
  </form>
</article>
{{ end }}
