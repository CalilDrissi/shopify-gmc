{{ define "content" }}
<article class="c-card c-card--elevated">
  <div class="c-card__header">
    <h1 class="c-card__title">Set a new password</h1>
  </div>
  <form class="c-card__body" method="post" action="/reset-password/{{ .Token }}" style="display:flex; flex-direction:column; gap:16px;">
    {{ template "form-field" .Fields.Password }}
    {{ template "form-field" .Fields.Confirm }}
    <button type="submit" class="c-button c-button--filled c-button--full-width">
      <span class="c-button__label">Update password</span>
    </button>
  </form>
</article>
{{ end }}
