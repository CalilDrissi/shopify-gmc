{{ define "content" }}
<h1 class="page-title">Tenants</h1>
<article class="c-card c-card--outlined">
  <div class="c-card__body">
    <table style="width:100%; border-collapse:collapse;">
      <thead>
        <tr style="text-align:left; color:var(--md-sys-color-on-surface-variant);">
          <th style="padding:8px 0;">Name</th>
          <th style="padding:8px 0;">Owner</th>
          <th style="padding:8px 0;">Plan</th>
          <th style="padding:8px 0;">Members</th>
          <th style="padding:8px 0;"></th>
        </tr>
      </thead>
      <tbody>
        {{- range .Data }}
        <tr style="border-top:1px solid var(--md-sys-color-outline-variant);">
          <td style="padding:12px 0;">
            <a href="/admin/tenants/{{ .Tenant.ID }}"><strong>{{ .Tenant.Name }}</strong></a>
            <div style="color:var(--md-sys-color-on-surface-variant); font-size:0.875rem;">{{ .Tenant.Slug }}</div>
          </td>
          <td style="padding:12px 0;">{{ if .OwnerEmail }}{{ .OwnerEmail }}{{ else }}—{{ end }}</td>
          <td style="padding:12px 0;"><span class="c-pill c-pill--outlined">{{ .Tenant.Plan }}</span></td>
          <td style="padding:12px 0;">{{ .MemberCount }}</td>
          <td style="padding:12px 0; text-align:right;">
            <a href="/admin/tenants/{{ .Tenant.ID }}" class="c-button c-button--text c-button--small"><span class="c-button__label">Open</span></a>
          </td>
        </tr>
        {{- end }}
      </tbody>
    </table>
  </div>
</article>
{{ end }}
