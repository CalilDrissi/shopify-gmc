{{ define "content" }}
<section class="auth-card">
  <h1 class="page-title">You're unsubscribed.</h1>
  <p>You'll no longer receive <code>{{ .Trigger }}</code> alerts for this store.</p>
  <p>To re-subscribe, sign in and toggle the alert back on from the store's Monitoring panel.</p>
  <p style="margin-top:24px;">
    <a class="c-button c-button--text" href="/login"><span class="c-button__label">Sign in</span></a>
  </p>
</section>
{{ end }}
