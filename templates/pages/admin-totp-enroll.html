{{ define "content" }}
<article class="c-card c-card--elevated">
  <div class="c-card__header">
    <h1 class="c-card__title">Set up two-factor</h1>
    <p class="c-card__subtitle">{{ .Email }}</p>
  </div>
  <div class="c-card__body" style="display:flex; flex-direction:column; gap:16px; align-items:flex-start;">
    <p>Scan this QR with your authenticator app (1Password, Authy, Google Authenticator), then enter the 6-digit code below.</p>
    <img src="{{ .QRDataURL }}" alt="TOTP QR code" width="240" height="240">
    <details>
      <summary style="cursor:pointer;">Can't scan? Show secret</summary>
      <p style="margin-top:8px;"><code>{{ .Secret }}</code></p>
    </details>
    <form method="post" action="/admin/totp/enroll" style="display:flex; flex-direction:column; gap:16px; width:100%;">
      <input type="hidden" name="secret" value="{{ .Secret }}">
      {{ template "form-field" .Fields.Code }}
      <button type="submit" class="c-button c-button--filled">
        <span class="c-button__label">Confirm and continue</span>
      </button>
    </form>
  </div>
</article>
{{ end }}
