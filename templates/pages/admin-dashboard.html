{{ define "content" }}
<h1 class="page-title">Dashboard</h1>
{{ with .Data }}
<div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px;">
  <article class="c-card c-card--elevated">
    <div class="c-card__header"><h3 class="c-card__title">Tenants</h3></div>
    <div class="c-card__body" style="font-size:2rem; font-weight:600;">{{ .Tenants }}</div>
  </article>
  <article class="c-card c-card--elevated">
    <div class="c-card__header"><h3 class="c-card__title">Users</h3></div>
    <div class="c-card__body" style="font-size:2rem; font-weight:600;">{{ .Users }}</div>
  </article>
  <article class="c-card c-card--elevated">
    <div class="c-card__header"><h3 class="c-card__title">Memberships</h3></div>
    <div class="c-card__body" style="font-size:2rem; font-weight:600;">{{ .Members }}</div>
  </article>
  <article class="c-card c-card--elevated">
    <div class="c-card__header"><h3 class="c-card__title">Platform admins</h3></div>
    <div class="c-card__body" style="font-size:2rem; font-weight:600;">{{ .Admins }}</div>
  </article>
</div>
{{ end }}
{{ end }}
