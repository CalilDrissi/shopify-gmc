{{ define "content" }}
<article class="c-card c-card--elevated">
  <div class="c-card__header">
    <h1 class="c-card__title">Sign in</h1>
  </div>
  <form class="c-card__body" method="post" action="/login" style="display:flex; flex-direction:column; gap:16px;">
    {{ if .Next }}<input type="hidden" name="next" value="{{ .Next }}">{{ end }}
    {{ template "form-field" .Fields.Email }}
    {{ template "form-field" .Fields.Password }}
    <button type="submit" class="c-button c-button--filled c-button--full-width">
      <span class="c-button__label">Sign in</span>
    </button>
    <p style="text-align:center;">
      <a href="/forgot-password">Forgot password?</a>
    </p>
    <p style="text-align:center; color:var(--md-sys-color-on-surface-variant);">
      No account? <a href="/signup">Sign up</a>.
    </p>
  </form>
</article>
{{ end }}
